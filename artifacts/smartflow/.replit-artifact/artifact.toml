kind = "web"
previewPath = "/"
title = "SmartFlow Systems"
version = "1.0.0"
id = "artifacts/smartflow"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19158

[services.development]
run = "pnpm --filter @workspace/smartflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smartflow", "run", "build" ]
serve = "static"
publicDir = "artifacts/smartflow/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19158"
BASE_PATH = "/"
